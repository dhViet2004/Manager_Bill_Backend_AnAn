name: Build and Deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  REGISTRY: docker.io
  # IMAGE_NAME sẽ có dạng: username/managerbill-backend
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/managerbill-backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}
            type=sha,prefix={{branch}}-

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-to-vps:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 8686
          script: |
            set -e

            echo "=== 1. Docker Hub login ==="
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            echo "=== 2. Clone/pull repo ==="
            mkdir -p /root/managerbill
            cd /root/managerbill
            
            if [ -d .git ]; then
              # Cập nhật URL với Token mới của lần chạy này để tránh lỗi 401
              git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ secrets.REPO_FULL_NAME }}.git
              git pull origin master
            else
              git clone --depth 1 https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ secrets.REPO_FULL_NAME }}.git .
            fi

            echo "=== 3. Write .env.vps ==="
            cat > .env.vps << 'ENVEOF'
            DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}
            MYSQL_DATABASE=managerbill_anan
            MYSQL_USER=managerbill
            MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}
            PORT=4001
            BACKEND_URL=${{ secrets.BACKEND_URL }}
            FRONTEND_URL=${{ secrets.FRONTEND_URL }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_EXPIRES_IN=7d
            ENVEOF

            echo "=== 4. Pull image and recreate containers ==="
            docker compose --env-file .env.vps pull
            docker compose --env-file .env.vps up -d --force-recreate

            echo "=== 5. Run data migration (collected_amount → collection_history_entries) ==="
            docker exec managerbill_backend npm run migrate:collected-amount || true

            echo "=== 6. Cleanup ==="
            docker image prune -f

            echo "Deployment completed successfully."